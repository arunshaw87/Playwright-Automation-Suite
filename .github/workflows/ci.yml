name: Test Suite CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "24"
  # P99 latency ceiling for the load smoke run (milliseconds)
  LOAD_P99_THRESHOLD_MS: "2000"

jobs:
  # ============================================================
  # API Tests — always runs, skips endpoints that are not yet
  # implemented (404 responses are treated as graceful skips).
  # Uses a Dockerised API server to keep the environment consistent.
  # ============================================================
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-api-${{ hashFiles('tests/api/requirements-api.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-api-

      - name: Install API test dependencies
        run: pip install -r requirements-api.txt

      - name: Build and start API server container
        working-directory: .
        run: |
          docker compose build api-server
          docker compose up -d api-server
          echo "Waiting for API server container health check..."
          timeout 60 bash -c '
            until docker compose ps api-server | grep -q "healthy"; do
              sleep 2
            done
          '
          echo "API server container is healthy"
        env:
          API_SERVER_HOST_PORT: "8080"
          API_SERVER_PORT: "80"

      - name: Run API tests
        env:
          API_BASE_URL: "http://localhost:8080"
        run: |
          python -m pytest tests/ \
            --tb=short \
            -v

      - name: Tear down API server container
        if: always()
        working-directory: .
        run: docker compose down api-server

      - name: Upload JUnit XML + HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            tests/api/reports/junit/
            tests/api/reports/html/

  # ============================================================
  # UI Tests — browser matrix (Chromium and Firefox)
  # Targets https://www.saucedemo.com (public demo site)
  # ============================================================
  ui-tests:
    name: UI Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    defaults:
      run:
        working-directory: tests/ui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ui-${{ hashFiles('tests/ui/requirements-ui.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-ui-

      - name: Install UI test dependencies
        run: pip install -r requirements-ui.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps ${{ matrix.browser }}

      - name: Run UI tests
        env:
          BROWSER: ${{ matrix.browser }}
        run: |
          python -m pytest tests/ \
            --browser ${{ matrix.browser }} \
            --tb=short \
            -v

      - name: Upload test results and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results-${{ matrix.browser }}
          path: |
            tests/ui/reports/junit/
            tests/ui/reports/html/
            tests/ui/reports/screenshots/

  # ============================================================
  # Load Tests — smoke profile only in CI (1 min, 5 users)
  # Runs after API tests pass to confirm the server is stable.
  # Uses the same Dockerised API server as the api-tests job.
  # Fails if any P99 latency exceeds LOAD_P99_THRESHOLD_MS.
  # ============================================================
  load-tests-smoke:
    name: Load Tests (Smoke)
    runs-on: ubuntu-latest
    needs: [api-tests]
    defaults:
      run:
        working-directory: tests/load

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-load-${{ hashFiles('tests/load/requirements-load.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-load-

      - name: Install Locust
        run: pip install -r requirements-load.txt

      - name: Build and start API server container
        working-directory: .
        run: |
          docker compose build api-server
          docker compose up -d api-server
          echo "Waiting for API server container health check..."
          timeout 60 bash -c '
            until docker compose ps api-server | grep -q "healthy"; do
              sleep 2
            done
          '
          echo "API server container is healthy"
        env:
          API_SERVER_HOST_PORT: "8080"
          API_SERVER_PORT: "80"

      - name: Run Locust smoke test
        run: |
          mkdir -p reports/load
          locust \
            -f locustfile.py \
            --headless \
            --users 5 \
            --spawn-rate 1 \
            --run-time 1m \
            --host http://localhost:8080 \
            --html reports/load/smoke_report.html \
            --csv reports/load/smoke \
            --exit-code-on-error 1

      - name: Enforce P99 latency threshold (${{ env.LOAD_P99_THRESHOLD_MS }} ms)
        run: |
          python scripts/check_p99_threshold.py \
            reports/load/smoke_stats.csv \
            --threshold-ms ${{ env.LOAD_P99_THRESHOLD_MS }}

      - name: Tear down API server container
        if: always()
        working-directory: .
        run: docker compose down api-server

      - name: Upload load test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-smoke-results
          path: tests/load/reports/load/

  # ============================================================
  # Mobile Tests — opt-in via repository variable ENABLE_MOBILE_TESTS
  # Requires an Appium server and device/emulator.
  # ============================================================
  mobile-tests:
    name: Mobile Tests
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_MOBILE_TESTS == 'true' }}
    continue-on-error: true
    defaults:
      run:
        working-directory: tests/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mobile-${{ hashFiles('tests/mobile/requirements-mobile.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-mobile-

      - name: Install mobile test dependencies
        run: pip install -r requirements-mobile.txt

      - name: Run mobile tests
        env:
          APPIUM_SERVER_URL: ${{ vars.APPIUM_SERVER_URL }}
          ANDROID_APP_PATH: ${{ vars.ANDROID_APP_PATH }}
          MOBILE_PLATFORM: android
        run: |
          python -m pytest tests/ \
            --tb=short \
            -v

      - name: Upload mobile test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-results
          path: |
            tests/mobile/reports/junit/
            tests/mobile/reports/html/
            tests/mobile/reports/screenshots/
