version: "3.9"

# ============================================================
# Test orchestration
#
# Usage:
#   docker compose run --rm api-tests        # API tests only
#   docker compose run --rm ui-tests         # UI tests (Chromium by default)
#   docker compose run --rm load-tests       # Smoke load test
#   docker compose up api-server             # API server only (for manual testing)
#
# Environment variable substitution:
#   Copy .env.example to .env and set values, or export them in your shell.
#   All variables have sensible defaults so the stack works out-of-the-box.
# ============================================================

services:
  # --------------------------------------------------------
  # API Server (Express — built from source)
  # --------------------------------------------------------
  api-server:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    environment:
      PORT: "${API_SERVER_PORT:-80}"
      NODE_ENV: "${NODE_ENV:-production}"
      DATABASE_URL: "${DATABASE_URL:-}"
    ports:
      - "${API_SERVER_HOST_PORT:-8080}:${API_SERVER_PORT:-80}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_SERVER_PORT:-80}/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------
  # API Tests (Pytest + HTTPX + Pydantic v2)
  # --------------------------------------------------------
  api-tests:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      api-server:
        condition: service_healthy
    environment:
      API_BASE_URL: "${API_BASE_URL:-http://api-server:80}"
      API_USERNAME: "${API_USERNAME:-admin}"
      API_PASSWORD: "${API_PASSWORD:-password}"
      API_AUTH_PATH: "${API_AUTH_PATH:-/api/auth/login}"
      API_TIMEOUT: "${API_TIMEOUT:-10}"
    volumes:
      - ./tests/api/reports:/app/tests/api/reports
    command: ["tests/", "--tb=short", "-v"]

  # --------------------------------------------------------
  # UI Tests (Pytest + Playwright + POM)
  # --------------------------------------------------------
  ui-tests:
    build:
      context: .
      dockerfile: Dockerfile.ui
    environment:
      BASE_URL: "${UI_BASE_URL:-https://www.saucedemo.com}"
      BROWSER: "${BROWSER:-chromium}"
      HEADLESS: "${HEADLESS:-true}"
    volumes:
      - ./tests/ui/reports:/app/tests/ui/reports
    command: ["tests/", "--tb=short", "-v", "--browser=${BROWSER:-chromium}"]

  # --------------------------------------------------------
  # Load Tests (Locust — smoke profile by default)
  # --------------------------------------------------------
  load-tests:
    build:
      context: .
      dockerfile: Dockerfile.load
    depends_on:
      api-server:
        condition: service_healthy
    environment:
      LOCUST_HOST: "${LOCUST_HOST:-http://api-server:80}"
      API_USERNAME: "${API_USERNAME:-admin}"
      API_PASSWORD: "${API_PASSWORD:-password}"
      API_AUTH_PATH: "${API_AUTH_PATH:-/api/auth/login}"
    volumes:
      - ./tests/load/reports:/app/tests/load/reports
    command:
      - "--headless"
      - "--users"
      - "${LOCUST_USERS:-5}"
      - "--spawn-rate"
      - "${LOCUST_SPAWN_RATE:-1}"
      - "--run-time"
      - "${LOCUST_RUN_TIME:-1m}"
      - "--host"
      - "${LOCUST_HOST:-http://api-server:80}"
      - "--html"
      - "reports/load/smoke_report.html"
      - "--csv"
      - "reports/load/smoke"
      - "--exit-code-on-error"
      - "1"
