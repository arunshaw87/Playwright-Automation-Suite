# Locust configuration file
# Settings here are used as defaults; CLI flags override them.
# Reference: https://docs.locust.io/en/stable/configuration.html

# Target host — override via --host or LOCUST_HOST env var
host = http://localhost:80

# Headless defaults — override per profile with run_*.sh scripts
headless = false

# Web UI port (UI mode only)
web-port = 8089

# Log level
loglevel = INFO
