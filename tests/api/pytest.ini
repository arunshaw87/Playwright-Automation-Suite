[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .

markers =
    smoke: Quick smoke tests — run on every commit
    regression: Full regression suite
    api: API tests
    health: Health endpoint tests
    auth: Authentication tests
    users: User CRUD tests
    products: Product CRUD tests

addopts =
    --tb=short
    --strict-markers
    -v
    --junitxml=reports/junit/results.xml

log_cli = true
log_cli_level = INFO
log_format = %(asctime)s %(levelname)s %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
