version: "3.9"

# ============================================================
# Mobile test infrastructure (Appium server + Android emulator + mobile tests)
#
# PREREQUISITES on the host machine:
#   - Android SDK installed, ANDROID_HOME configured
#   - An AVD created (e.g., Pixel_5_API_33)
#   - KVM hardware acceleration enabled for emulator performance
#   - x86_64 or ARM64 host (emulator requires hardware virtualisation)
#
# For cloud execution (BrowserStack, Sauce Labs), override:
#   APPIUM_SERVER_URL=https://hub-cloud.browserstack.com/wd/hub
#
# Usage:
#   # Start Appium + emulator only
#   docker compose -f docker-compose.mobile.yml up appium-server android-emulator
#
#   # Run full mobile test suite
#   docker compose -f docker-compose.mobile.yml run --rm mobile-tests
# ============================================================

services:
  # --------------------------------------------------------
  # Android Emulator (stubbed — requires KVM on host)
  # Image: budtmo/docker-android provides a pre-built AVD with
  # VNC and ADB bridge for CI-friendly emulator runs.
  # Replace the image/environment with your preferred provider
  # (e.g., Genymotion SaaS, BrowserStack Automate, Sauce Labs).
  # --------------------------------------------------------
  android-emulator:
    image: budtmo/docker-android:emulator_14.0
    privileged: true   # Required for KVM access inside Docker
    environment:
      EMULATOR_DEVICE: "Pixel 5"
      WEB_VNC: "true"
      APPIUM: "false"   # Let the dedicated appium-server service handle Appium
    ports:
      - "6080:6080"    # noVNC web viewer (optional, for debugging)
    devices:
      - /dev/kvm:/dev/kvm   # Hardware acceleration (Linux only)
    healthcheck:
      test: ["CMD", "adb", "devices"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # --------------------------------------------------------
  # Appium Server
  # --------------------------------------------------------
  appium-server:
    image: appium/appium:latest
    ports:
      - "4723:4723"
    environment:
      APPIUM_LOG_LEVEL: info
    depends_on:
      android-emulator:
        condition: service_healthy
    volumes:
      - /dev/bus/usb:/dev/bus/usb   # Physical device access (optional)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4723/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------
  # Mobile Tests (Pytest + Appium 2.x + POM)
  # --------------------------------------------------------
  mobile-tests:
    build:
      context: .
      dockerfile: Dockerfile.mobile
    depends_on:
      appium-server:
        condition: service_healthy
    environment:
      APPIUM_SERVER_URL: "${APPIUM_SERVER_URL:-http://appium-server:4723}"
      MOBILE_PLATFORM: "${MOBILE_PLATFORM:-android}"
      ANDROID_DEVICE_NAME: "${ANDROID_DEVICE_NAME:-emulator-5554}"
      ANDROID_APP_PATH: "${ANDROID_APP_PATH:-}"
      ANDROID_APP_PACKAGE: "${ANDROID_APP_PACKAGE:-}"
      ANDROID_APP_ACTIVITY: "${ANDROID_APP_ACTIVITY:-}"
      IOS_DEVICE_NAME: "${IOS_DEVICE_NAME:-iPhone 15 Simulator}"
      IOS_PLATFORM_VERSION: "${IOS_PLATFORM_VERSION:-17.5}"
      IOS_APP_PATH: "${IOS_APP_PATH:-}"
      IOS_BUNDLE_ID: "${IOS_BUNDLE_ID:-}"
      MOBILE_ELEMENT_TIMEOUT: "${MOBILE_ELEMENT_TIMEOUT:-10}"
    volumes:
      - ./tests/mobile/reports:/app/tests/mobile/reports
