version: "3.9"

# ============================================================
# Mobile test infrastructure (Appium server + Android emulator)
#
# IMPORTANT: This compose file requires a host machine with:
#   - Android SDK installed and ANDROID_HOME configured
#   - An AVD created (e.g., Pixel_5_API_33)
#   - KVM hardware acceleration for emulator performance
#
# For cloud execution (BrowserStack, Sauce Labs), set:
#   APPIUM_SERVER_URL=https://hub-cloud.browserstack.com/wd/hub
#
# Usage:
#   docker compose -f docker-compose.mobile.yml up appium-server
#   docker compose -f docker-compose.mobile.yml run mobile-tests
# ============================================================

services:
  # --------------------------------------------------------
  # Appium Server
  # --------------------------------------------------------
  appium-server:
    image: appium/appium:latest
    ports:
      - "4723:4723"
    environment:
      APPIUM_LOG_LEVEL: info
    volumes:
      - /dev/bus/usb:/dev/bus/usb   # Physical device access (optional)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4723/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------
  # Mobile Tests
  # Dockerfile.mobile is defined below; builds from tests/mobile/
  # using the same python:3.13-slim base as other test images.
  # --------------------------------------------------------
  mobile-tests:
    build:
      context: .
      dockerfile: Dockerfile.mobile
    depends_on:
      appium-server:
        condition: service_healthy
    environment:
      APPIUM_SERVER_URL: "http://appium-server:4723"
      MOBILE_PLATFORM: "${MOBILE_PLATFORM:-android}"
      ANDROID_DEVICE_NAME: "${ANDROID_DEVICE_NAME:-emulator-5554}"
      ANDROID_APP_PATH: "${ANDROID_APP_PATH:-}"
      IOS_DEVICE_NAME: "${IOS_DEVICE_NAME:-iPhone 15 Simulator}"
      IOS_PLATFORM_VERSION: "${IOS_PLATFORM_VERSION:-17.5}"
      IOS_APP_PATH: "${IOS_APP_PATH:-}"
    volumes:
      - ./tests/mobile/reports:/app/tests/mobile/reports
